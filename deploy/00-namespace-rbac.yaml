# OnGo namespace, service accounts, RBAC and network isolation.
# Apply once before running ongod:  kubectl apply -f deploy/00-namespace-rbac.yaml
---
apiVersion: v1
kind: Namespace
metadata:
  name: ongo
  labels:
    ongo.dev/managed: "true"
    # Enforce the restricted Pod Security Standard on every VM pod.
    pod-security.kubernetes.io/enforce: restricted
    pod-security.kubernetes.io/enforce-version: latest
---
# Identity the VM pods run as. It is granted no API permissions and never
# automounts a token, so a compromised VM cannot talk to the API server.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: ongo-vm
  namespace: ongo
automountServiceAccountToken: false
---
# Identity for the control plane when it runs in-cluster (future / 10-ongod.yaml).
# In local dev ongod uses your kubeconfig and does not need this.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: ongod
  namespace: ongo
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: ongod
  namespace: ongo
rules:
  - apiGroups: [""]
    resources: ["pods", "persistentvolumeclaims"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: [""]
    resources: ["configmaps", "secrets"]
    verbs: ["get", "create", "update", "patch"]
  - apiGroups: [""]
    resources: ["pods/exec"]
    verbs: ["create", "get"]
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: ongod
  namespace: ongo
subjects:
  - kind: ServiceAccount
    name: ongod
    namespace: ongo
roleRef:
  kind: Role
  name: ongod
  apiGroup: rbac.authorization.k8s.io
---
# Tenant isolation: VM pods accept no inbound pod-network traffic. Exec reaches
# them through the API server, not the pod network, so shells still work.
# Egress is left open so VMs can reach the internet (apt, pip, etc.).
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: ongo-vm-deny-ingress
  namespace: ongo
spec:
  podSelector:
    matchLabels:
      ongo.dev/managed: "true"
  policyTypes: ["Ingress"]
  ingress: []
