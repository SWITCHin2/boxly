# Cluster-scoped RBAC for the Boxly control plane (boxlyd).
#
# Namespaces are CLUSTER-scoped resources, so granting "create namespace"
# requires a ClusterRole + ClusterRoleBinding (a namespaced Role cannot do it).
# This also lets boxlyd manage boxes (pods, PVCs, deployments, exec, the per-box
# ServiceAccount, NetworkPolicies, pull Secrets, the ongo-config ConfigMap) in
# ANY namespace it creates or manages.
#
# Apply once:  kubectl apply -f deploy/01-boxlyd-rbac.yaml
# Then run the boxlyd Deployment with  serviceAccountName: boxlyd
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: boxlyd
  namespace: ongo          # the namespace boxlyd itself runs in
  labels:
    app: boxlyd
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: boxlyd
  labels:
    app: boxlyd
rules:
  # Create & manage namespaces (cluster-scoped).
  - apiGroups: [""]
    resources: ["namespaces"]
    verbs: ["get", "list", "watch", "create", "delete"]

  # Boxes and their supporting objects, in any namespace.
  - apiGroups: [""]
    resources:
      - pods
      - pods/exec        # the ssh / exec bridge
      - pods/log
      - persistentvolumeclaims   # persistent boxes
      - configmaps               # ongo-config (runtime settings/templates/users)
      - secrets                  # image pull secrets
      - serviceaccounts          # the restricted per-box SA (ongo-vm)
      - services                 # for future port-forward / preview
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]

  # Persistent boxes are Deployments.
  - apiGroups: ["apps"]
    resources: ["deployments", "replicasets"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]

  # Tenant isolation for box pods.
  - apiGroups: ["networking.k8s.io"]
    resources: ["networkpolicies"]
    verbs: ["get", "list", "create", "update", "patch", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: boxlyd
  labels:
    app: boxlyd
subjects:
  - kind: ServiceAccount
    name: boxlyd
    namespace: ongo
roleRef:
  kind: ClusterRole
  name: boxlyd
  apiGroup: rbac.authorization.k8s.io
