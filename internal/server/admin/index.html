<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>BOXLY · Container Manager</title>
<link rel="icon" href="/admin/logo">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&display=swap" rel="stylesheet">
<style>
  :root{
    --pixel:"Press Start 2P", ui-monospace, monospace;
    --body:"VT323", ui-monospace, "Courier New", monospace;
    --wood:#6b4a2b; --wood-d:#3f2a18; --wood-l:#8a6135;
    --stone:#8b8b8b; --stone-d:#555; --stone-l:#c6c6c6; --stone-bg:#2b2b2b;
    --slot:#8b8b8b; --slot-in:#373737;
    --ok:#46c93a; --ok-d:#2c8a26; --err:#d84b4b; --err-d:#9e2f2f; --warn:#e0b13a;
    --ink:#1c1408; --paper:#dcd2bf;
  }
  *{box-sizing:border-box;}
  html,body{height:100%;}
  body{margin:0; background:#1b1712; color:#e8e2d4; font-family:var(--body); font-size:19px; line-height:1.2;
    image-rendering:pixelated; -webkit-font-smoothing:none;
    background-image:repeating-linear-gradient(0deg,#1b1712 0 2px,#191510 2px 4px);}
  .px{font-family:var(--pixel); -webkit-font-smoothing:none;}
  button{font-family:var(--body); cursor:pointer; color:inherit;}
  img{image-rendering:pixelated;}
  input,textarea,select{font-family:var(--body); font-size:18px;}

  /* beveled blocks (Minecraft GUI) */
  .bevel{ border:3px solid; border-color:var(--stone-l) var(--stone-d) var(--stone-d) var(--stone-l); background:var(--stone); }
  .bevel-in{ border:3px solid; border-color:var(--slot-in) var(--stone-l) var(--stone-l) var(--slot-in); background:#6f6f6f; }
  .wood{ background:var(--wood);
    background-image:repeating-linear-gradient(90deg, var(--wood) 0 6px, var(--wood-l) 6px 7px, var(--wood) 7px 26px, var(--wood-d) 26px 27px);
    border:4px solid; border-color:var(--wood-l) var(--wood-d) var(--wood-d) var(--wood-l); }

  .wrap{ max-width:1180px; margin:0 auto; padding:18px; }

  /* header banner */
  header.banner{ display:flex; align-items:center; gap:16px; padding:12px 16px; margin-bottom:14px; }
  header .logo{ width:64px; height:64px; image-rendering:pixelated; object-fit:contain; filter:drop-shadow(0 0 8px rgba(255,200,90,.5)); }
  header h1{ margin:0; font-size:18px; color:#ffe9a8; text-shadow:2px 2px 0 var(--wood-d); }
  header .sub{ margin-top:8px; font-size:18px; color:#e8d9b0; }
  header .right{ margin-left:auto; display:flex; gap:8px; align-items:center; }

  /* tabs */
  .tabs{ display:flex; gap:8px; margin-bottom:14px; }
  .tab{ font-family:var(--pixel); font-size:11px; padding:12px 14px; background:var(--stone); border:3px solid; border-color:var(--stone-l) var(--stone-d) var(--stone-d) var(--stone-l); color:#222; }
  .tab:hover{ filter:brightness(1.08); }
  .tab.active{ background:#bdbdbd; border-color:var(--slot-in) var(--stone-l) var(--stone-l) var(--slot-in); color:#000; }

  .btn{ font-family:var(--pixel); font-size:10px; padding:11px 13px; background:var(--stone); border:3px solid; border-color:var(--stone-l) var(--stone-d) var(--stone-d) var(--stone-l); color:#1a1a1a; }
  .btn:hover{ filter:brightness(1.08); } .btn:active{ border-color:var(--stone-d) var(--stone-l) var(--stone-l) var(--stone-d); }
  .btn.go{ background:#5aa84f; border-color:#86d97a #2c6a25 #2c6a25 #86d97a; color:#08210a; }
  .btn.red{ background:#c25151; border-color:#e29393 #7a2a2a #7a2a2a #e29393; color:#2a0a0a; }

  .layout{ display:grid; grid-template-columns:190px 1fr; gap:14px; align-items:start; }
  /* sidebar */
  aside{ padding:12px; }
  aside h3{ font-family:var(--pixel); font-size:10px; color:#3a2a18; margin:2px 0 12px; }
  aside .cat{ display:block; width:100%; text-align:left; font-size:19px; padding:8px 10px; margin-bottom:6px; background:#5e4striped; }
  aside .cat{ background:var(--wood-l); border:3px solid; border-color:#a07b46 #2f1f10 #2f1f10 #a07b46; color:#1d1206; }
  aside .cat.active{ background:#caa15e; }

  /* card grid */
  .grid{ display:grid; grid-template-columns:repeat(auto-fill,minmax(238px,1fr)); gap:14px; padding:16px; }
  .slot{ padding:12px; min-height:150px; display:flex; flex-direction:column; gap:9px; cursor:default; }
  .slot .ico{ width:30px; height:30px; flex:none; }
  .slot-hd{ display:flex; gap:9px; align-items:center; }
  .slot .nm{ font-size:20px; color:#fff; text-shadow:2px 2px 0 #000; line-height:1.05; }
  .slot .sub{ font-size:13px; color:#b7ad95; font-family:ui-monospace,monospace; }
  .slot .meta{ font-size:15px; color:#d8cfb8; display:flex; justify-content:space-between; gap:8px; }
  .slot .meta b{ color:#fff; font-weight:600; }
  .stats{ display:grid; grid-template-columns:repeat(3,1fr); gap:6px; }
  .stats .st{ text-align:center; background:rgba(0,0,0,.22); padding:6px 2px; }
  .stats .st b{ display:block; font-size:22px; color:#fff; line-height:1; }
  .stats .st span{ font-size:11px; color:#b7ad95; }
  .slot .cap{ height:12px; background:#222; border:2px solid #000; margin-top:auto; }
  .slot .cap > i{ display:block; height:100%; background:var(--ok); }
  /* minecraft block-building loader */
  .loader{ display:flex; flex-direction:column; align-items:center; gap:14px; padding:44px; }
  .blocks{ display:flex; gap:5px; }
  .blocks i{ width:18px; height:18px; background:var(--wood-l); border:2px solid var(--wood-d); box-shadow:inset -3px -3px 0 rgba(0,0,0,.25); animation:bpop 1.1s infinite ease-in-out; }
  .blocks i:nth-child(2){ animation-delay:.13s; } .blocks i:nth-child(3){ animation-delay:.26s; }
  .blocks i:nth-child(4){ animation-delay:.39s; } .blocks i:nth-child(5){ animation-delay:.52s; }
  .loader span{ font-family:var(--pixel); font-size:10px; color:#cdbf9f; }
  @keyframes bpop{ 0%,100%{ transform:translateY(0); opacity:.35; } 50%{ transform:translateY(-12px); opacity:1; } }
  .status{ display:inline-block; font-family:var(--pixel); font-size:8px; padding:3px 6px; }
  .status.on{ background:#16331a; color:var(--ok); border:2px solid var(--ok-d); }
  .status.off{ background:#331616; color:var(--err); border:2px solid var(--err-d); }

  /* panels (inventory editor / network) */
  .panel{ padding:16px; margin-bottom:14px; }
  .panel h2{ font-family:var(--pixel); font-size:11px; color:#3a2a18; margin:0 0 14px; }
  .twocol{ display:grid; grid-template-columns:1fr 1fr; gap:14px; align-items:start; }
  @media (max-width:980px){ .twocol{grid-template-columns:1fr;} .layout{grid-template-columns:1fr;} }
  label{ display:block; font-size:17px; color:#3a2a18; margin:0 0 4px; }
  input,textarea{ width:100%; padding:8px 10px; background:#efe7d4; color:#1c1408; border:3px solid; border-color:#9c917a #fff #fff #9c917a; }
  textarea.code{ font-family:ui-monospace,monospace; font-size:13px; line-height:1.5; min-height:300px; white-space:pre; background:#1c2330; color:#c8e0ff; border-color:#0a0f17 #3a4a63 #3a4a63 #0a0f17; }
  .field{ margin-bottom:12px; } .row{ display:grid; grid-template-columns:repeat(auto-fit,minmax(150px,1fr)); gap:12px; }
  .tlist{ display:flex; flex-direction:column; gap:6px; }
  .titem{ text-align:left; padding:10px; font-size:19px; color:#1d1206; background:var(--wood-l); border:3px solid; border-color:#a07b46 #2f1f10 #2f1f10 #a07b46; }
  .titem.active{ background:#caa15e; }
  .titem .b{ font-size:11px; }
  .note{ font-size:17px; color:#6b5a40; margin:8px 0 0; } .mono{ font-family:ui-monospace,monospace; font-size:15px; }
  .toolbar{ display:flex; gap:8px; align-items:center; margin-bottom:12px; }
  .toolbar .sp{ margin-left:auto; }
  .empty{ padding:44px 20px; text-align:center; color:#e8dcc0; font-size:21px; }
  .empty .px{ display:block; font-family:var(--pixel); font-size:10px; color:#b7ad95; margin-top:10px; }
  .podname{ font-family:ui-monospace,monospace; font-size:11px; color:#cdbf9f; word-break:break-all; text-align:right; }
  /* minecraft-style instruction sign board */
  .sign{ position:relative; margin:0 0 16px; padding:14px 18px 14px 22px; background:var(--wood-l);
    background-image:repeating-linear-gradient(0deg, rgba(0,0,0,.05) 0 7px, rgba(255,255,255,.04) 7px 8px);
    border:4px solid; border-color:#b88a52 #34230f #34230f #b88a52; box-shadow:inset 0 0 0 2px #6b4a2b; }
  .sign::before{ content:""; position:absolute; left:-4px; top:-12px; width:10px; height:12px; background:#4f351d; }
  .sign h4{ font-family:var(--pixel); font-size:11px; color:#2f1f10; margin:0 0 8px; }
  .sign ol{ margin:0; padding-left:24px; color:#241405; font-size:18px; }
  .sign li{ margin:4px 0; }
  .sign code{ font-family:ui-monospace,monospace; font-size:14px; background:#0e1218; color:#9fe0a0; padding:1px 5px; }
  .owner{ display:inline-block; font-family:var(--pixel); font-size:8px; padding:3px 6px; background:#26314a; color:#9ec2ff; border:2px solid #14203a; }
  .upanel{ border:3px solid; border-color:#34230f #b88a52 #b88a52 #34230f; background:rgba(0,0,0,.14); padding:12px; margin-bottom:12px; }
  .cmdinput{ font-family:ui-monospace,monospace; font-size:13px; background:#0e1218; color:#9fe0a0; border-color:#05070a #2a3445 #2a3445 #05070a; }

  /* login */
  .login{ display:grid; place-items:center; min-height:100vh; padding:20px; }
  .login .card{ width:100%; max-width:520px; padding:30px 28px; }
  .login .login-card{ max-width:960px; }
  .login-grid{ display:grid; grid-template-columns:1.05fr 1fr; gap:30px; align-items:center; }
  .login-left{ display:flex; flex-direction:column; }
  @media (max-width:860px){ .login-grid{ grid-template-columns:1fr; } }
  .kbd{ font-family:ui-monospace,monospace; font-size:.92em; background:#0e1218; color:#9fe0a0; padding:1px 6px; border:1px solid #05070a; }
  .login h2{ font-family:var(--pixel); font-size:15px; color:#ffe3a6; text-align:center; margin:0 0 12px; text-shadow:2px 2px 0 #2a1c0e; }
  .login p, .login label{ color:#f1e4c4; text-shadow:1px 1px 0 #2a1c0e; }
  .login p{ font-size:20px; text-align:center; margin:0 0 18px; }
  .login label{ font-size:18px; }
  .err{ color:#ffb0b0; font-size:18px; min-height:22px; margin-top:8px; text-shadow:1px 1px 0 #000; }
  /* glowing chest hero */
  .hero{ display:flex; flex-direction:column; align-items:center; gap:6px; margin-bottom:18px; }
  .glow{ position:relative; display:grid; place-items:center; width:190px; height:160px; }
  .glow::before{ content:""; position:absolute; width:170px; height:170px; border-radius:50%;
    background:radial-gradient(circle, rgba(255,214,130,.6) 0%, rgba(255,170,60,.22) 42%, rgba(255,150,40,0) 70%);
    filter:blur(4px); animation:torch 3s ease-in-out infinite; }
  .bigchest{ position:relative; z-index:1; width:160px; height:140px; object-fit:contain; image-rendering:pixelated;
    filter:drop-shadow(0 5px 0 rgba(0,0,0,.4)) drop-shadow(0 0 10px rgba(255,200,90,.45)); }
  .brand-xl{ font-size:36px; color:#ffe9a8; text-shadow:4px 4px 0 #000, 0 0 16px rgba(255,200,90,.55); letter-spacing:2px; }
  @keyframes torch{ 0%,100%{opacity:.7; transform:scale(1);} 50%{opacity:1; transform:scale(1.06);} }
  /* demo terminal preview */
  .info{ font-size:18px; color:#f1e4c4; text-align:center; margin:0 0 12px; text-shadow:1px 1px 0 #2a1c0e; }
  .term{ margin:0 0 20px; border:3px solid; border-color:#05070a #2a3445 #2a3445 #05070a; background:#0e1218; }
  .term .bar{ background:#1b2230; padding:6px 9px; display:flex; align-items:center; gap:6px; border-bottom:2px solid #05070a; }
  .term .bar i{ width:11px; height:11px; display:inline-block; }
  .term .bar i.r{ background:#ff5f56; } .term .bar i.y{ background:#ffbd2e; } .term .bar i.g{ background:#27c93f; }
  .term .bar span{ margin-left:6px; font-size:14px; color:#7f8ca0; font-family:ui-monospace,monospace; }
  .term .body{ padding:11px 13px; font-family:ui-monospace,monospace; font-size:15px; line-height:1.6; color:#cfe0f2; min-height:120px; white-space:pre-wrap; }
  .term .p{ color:#8fd35a; } .term .cmd{ color:#ffffff; } .term .ok{ color:#8fd35a; } .term .dim{ color:#9fb0a8; } .term .sel{ color:#ffe9a8; }
  .term .bn1{color:#fff0c8} .term .bn2{color:#ffe7b0} .term .bn3{color:#ffe1a8} .term .bn4{color:#e3bd76} .term .bn5{color:#c4944e}
  .term .rowg{ color:#e6e8df; } .term .selrow{ background:#3f7a2a; color:#fff3d6; }
  .term .tui{ white-space:pre; font-size:12px; line-height:1.45; height:210px; overflow:hidden; color:#e6e8df; }
  .statboard{ display:flex; gap:8px; justify-content:center; flex-wrap:wrap; margin:0 0 14px; }
  .statboard .stat{ font-family:var(--pixel); font-size:9px; color:#ffe9a8; background:var(--wood-d); border:2px solid #1f130a; padding:6px 9px; }
  .cur{ display:inline-block; width:9px; height:17px; background:#cfe0f2; vertical-align:-3px; animation:blink 1s steps(1) infinite; }
  @keyframes blink{ 50%{opacity:0;} }
  .toast{ position:fixed; bottom:18px; right:18px; padding:12px 16px; font-size:18px; color:#1c1408; }
  .hidden{ display:none!important; }
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login" class="login">
  <div class="card wood login-card">
   <div class="login-grid">
    <div class="login-left">
      <div class="hero">
        <div class="glow"><img src="/admin/logo" class="bigchest" alt="BOXLY"></div>
        <h1 class="px brand-xl">BOXLY</h1>
      </div>
      <h2>CONTAINER MANAGER</h2>
      <p class="info">Ephemeral dev containers, handed out in milliseconds.<br>Spin one up, jump in, throw it away.</p>
      <div class="statboard" id="statboard"></div>
      <label>ADMIN TOKEN</label>
      <input id="token" type="password" placeholder="BOXLY_ADMIN_TOKEN" onkeydown="if(event.key==='Enter')login()" autofocus>
      <div class="err" id="loginErr"></div>
      <div style="margin-top:14px"><button class="btn go" onclick="login()">ENTER</button></div>
    </div>
    <div class="login-right">
      <div class="term">
        <div class="bar"><i class="r"></i><i class="y"></i><i class="g"></i><span>boxly dashboard</span></div>
        <div class="body tui" id="demo"></div>
      </div>
      <p class="info" style="font-size:16px;margin:12px 2px 0;text-align:left">This is your users' view — they run <code class="kbd">boxly</code> and see only their own boxes.</p>
    </div>
   </div>
  </div>
</div>

<!-- APP -->
<div id="app" class="wrap hidden">
  <header class="banner wood">
    <img src="/admin/logo" class="logo" alt="BOXLY">
    <div>
      <h1 class="px">BOXLY — CONTAINER MANAGER</h1>
      <div class="sub px" id="overview" style="font-size:10px;color:#e8d9b0">OVERVIEW</div>
    </div>
    <div class="right">
      <button class="btn" onclick="refreshActive()">REFRESH</button>
      <button class="btn red" onclick="logout()">LOG OUT</button>
    </div>
  </header>

  <div class="tabs" id="tabs"></div>
  <div id="view"></div>
</div>

<div id="toast" class="toast wood hidden"></div>

<script>
const CRATE = `<svg class="ico" viewBox="0 0 16 16" shape-rendering="crispEdges">
  <rect x="1" y="1" width="14" height="14" fill="#7a5230"/>
  <rect x="1" y="1" width="14" height="2" fill="#9a6e3e"/><rect x="1" y="13" width="14" height="2" fill="#4f351d"/>
  <rect x="1" y="7" width="14" height="2" fill="#4f351d"/><rect x="7" y="1" width="2" height="14" fill="#4f351d"/>
  <rect x="1" y="1" width="14" height="14" fill="none" stroke="#2f1f10" stroke-width="1"/></svg>`;

const TABS = [
  {id:'containers', label:'CONTAINERS'},
  {id:'pools', label:'POOLS'},
  {id:'types', label:'BOX TYPES'},
  {id:'users', label:'USERS'},
  {id:'settings', label:'SETTINGS'},
];
let TOKEN = localStorage.getItem('boxlyToken')||'';
let view='storage', templates=[], sel=0, cat='ALL', timer=null;

function hdrs(){return{'Authorization':'Bearer '+TOKEN,'Content-Type':'application/json'};}
async function api(m,p,b){ const r=await fetch(p,{method:m,headers:hdrs(),body:b!==undefined?JSON.stringify(b):undefined});
  if(r.status===401) throw new Error('unauthorized'); if(!r.ok) throw new Error(((await r.json().catch(()=>({}))).error)||r.statusText);
  return r.status===204?null:r.json(); }
function esc(s){return(s==null?'':String(s)).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}
function toast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.remove('hidden');clearTimeout(t._t);t._t=setTimeout(()=>t.classList.add('hidden'),2200);}
function clock(){ const d=new Date(); document.getElementById('overview').textContent='OVERVIEW · '+d.toLocaleDateString()+' '+d.toLocaleTimeString(); }

async function login(){ TOKEN=document.getElementById('token').value.trim();
  try{ await api('GET','/v1/admin/pools'); }catch(e){ document.getElementById('loginErr').textContent='ACCESS DENIED: '+e.message; return; }
  localStorage.setItem('boxlyToken',TOKEN); boot(); }
function logout(){ localStorage.removeItem('boxlyToken'); location.reload(); }

function boot(){
  document.getElementById('login').classList.add('hidden');
  document.getElementById('app').classList.remove('hidden');
  document.getElementById('tabs').innerHTML = TABS.map(t=>`<button class="tab" data-t="${t.id}" onclick="go('${t.id}')">${t.label}</button>`).join('');
  clock(); setInterval(clock,1000);
  go('containers');
}
function go(v){ view=v;
  [...document.querySelectorAll('.tab')].forEach(b=>b.classList.toggle('active',b.dataset.t===v));
  clearInterval(timer); timer=null;
  if(v==='containers'){ renderContainers(); timer=setInterval(()=>{if(view==='containers')paintContainers();},3000); }
  if(v==='pools'){ renderPools(); timer=setInterval(()=>{if(view==='pools')paintPools();},3000); }
  if(v==='types') renderTypes();
  if(v==='users'){ renderUsers(); timer=setInterval(()=>{if(view==='users')paintUsers();},4000); }
  if(v==='settings') renderSettings();
}
function refreshActive(){ go(view); toast('REFRESHED'); }

const LOADING = '<div class="loader"><div class="blocks"><i></i><i></i><i></i><i></i><i></i></div><span>BUILDING…</span></div>';
function emptyBox(title,sub){ return `<div class="empty"><div class="blocks" style="justify-content:center;margin-bottom:16px;opacity:.55"><i></i><i></i><i></i></div>${title}${sub?`<span class="px">${sub}</span>`:''}</div>`; }
async function stopBox(id,name){
  if(!confirm('Force stop container '+(name||id)+'?')) return;
  try{ await api('DELETE','/v1/admin/boxes/'+encodeURIComponent(id)); toast('FORCE-STOPPED '+id); paintContainers(); }
  catch(e){ toast('ERROR: '+e.message); }
}

/* ---------- CONTAINERS (live individual boxes across all users) ---------- */
async function renderContainers(){
  document.getElementById('view').innerHTML = `
    <div class="sign"><h4>CONTAINERS — LIVE</h4>
      <ol><li>Every running container across all users, refreshed live.</li>
      <li>Each box is owned by the user who created it.</li>
      <li>Control launchable types under <b>BOX TYPES</b>, and access under <b>USERS</b>.</li></ol></div>
    <div class="bevel"><div class="grid" id="cgrid">${LOADING}</div></div>`;
  paintContainers();
}
async function paintContainers(){
  let boxes; try{ boxes = await api('GET','/v1/admin/boxes'); }catch(e){ if(e.message==='unauthorized')logout(); return; }
  const g=document.getElementById('cgrid'); if(!g) return;
  g.innerHTML = boxes.map(b=>{
    const online = b.status==='Running';
    const exp = b.expiresAt ? new Date(b.expiresAt).toLocaleTimeString() : '—';
    return `<div class="slot bevel-in">
      <div class="slot-hd">${CRATE}<div><div class="nm">${esc(b.name||b.id)}</div><div class="sub">${esc(b.id)}</div></div></div>
      <span class="status ${online?'on':'off'}">${online?'STATUS: ONLINE':'STATUS: '+esc(b.status).toUpperCase()}</span>
      <div class="meta"><span>TYPE</span><b>${esc(b.template||b.type)}</b></div>
      <div class="meta"><span>OWNER</span><span class="owner">${esc(b.owner||'—')}</span></div>
      <div class="meta"><span>EXPIRES</span><b>${exp}</b></div>
      <div class="meta"><span>POD</span><span class="podname">${esc(b.podName||'—')}</span></div>
      <button class="btn red" style="margin-top:8px" onclick="stopBox('${esc(b.id)}','${esc(b.name||b.id)}')">FORCE STOP</button>
    </div>`;}).join('') || emptyBox('NO ACTIVE CONTAINERS',"users haven't spun any up yet");
}

/* ---------- POOLS (per box-type warm-pool aggregates) ---------- */
async function renderPools(){
  document.getElementById('view').innerHTML = `
    <div class="sign"><h4>WARM POOLS</h4>
      <ol><li>Boxes kept ready per type so users get them instantly.</li>
      <li>Sizes auto-tune to demand — WAITING is ready stock, OCCUPIED is in use.</li></ol></div>
    <div class="bevel"><div class="grid" id="grid">${LOADING}</div></div>`;
  paintPools();
}
async function paintPools(){
  let pools; try{ pools = await api('GET','/v1/admin/pools'); }catch(e){ if(e.message==='unauthorized')logout(); return; }
  const g=document.getElementById('grid'); if(!g) return;
  g.innerHTML = pools.map(p=>{
    const total=p.claimed+p.ready, capPct= total>0?Math.round(p.claimed/total*100):0;
    return `<div class="slot bevel-in">
      <div class="slot-hd">${CRATE}<div><div class="nm">${esc(p.title)}${p.disabled?' <span class="sub">(disabled)</span>':''}</div><div class="sub">${esc(p.id)}</div></div></div>
      <div class="stats">
        <div class="st"><b>${p.warm}</b><span>WAITING</span></div>
        <div class="st"><b>${p.claimed}</b><span>OCCUPIED</span></div>
        <div class="st"><b>${p.desired}</b><span>DESIRED</span></div>
      </div>
      <div class="cap"><i style="width:${capPct}%;background:${capPct>85?'var(--err)':'var(--ok)'}"></i></div>
    </div>`;}).join('') || emptyBox('NO BOX TYPES','add one under BOX TYPES');
}

/* ---------- BOX TYPES (editor) — no re-render on keystroke (keeps focus) ---------- */
function tlabel(t){ return `${esc(t.title||t.id||'NEW')} ${t.builtin?'<span class="px" style="font-size:9px;color:#5a3c22">[BUILTIN]</span>':''}${t.disabled?'<span class="px" style="font-size:9px;color:#9e2f2f"> [OFF]</span>':''}`; }
async function renderTypes(){ templates=await api('GET','/v1/admin/templates'); if(sel>=templates.length)sel=0;
  document.getElementById('view').innerHTML = `
    <div class="sign"><h4>HOW TO ADD A BOX TYPE</h4>
      <ol><li>Click <b>+ NEW BOX TYPE</b>, then set an <b>ID</b> (e.g. dev-go) and a container <b>image</b>.</li>
      <li>Optional: a setup script, or open <b>K8S MANIFEST → LOAD GENERATED</b> and edit the Pod YAML by hand.</li>
      <li>Click <b>SAVE</b> — it becomes available to users and gets its own warm pool.</li></ol></div>
    <div class="toolbar"><button class="btn" onclick="addTmpl()">+ NEW BOX TYPE</button>
      <span class="sp"></span><button class="btn go" onclick="saveTemplates()">SAVE</button></div>
    <div class="layout">
      <aside class="wood"><h3>BOX TYPES</h3><div class="tlist" id="tlist"></div></aside>
      <div id="det"></div>
    </div>`;
  renderTList(); if(templates[sel]) paintDet(templates[sel]);
}
function renderTList(){
  document.getElementById('tlist').innerHTML = templates.map((t,i)=>
    `<button class="titem ${i===sel?'active':''}" id="ti-${i}" onclick="selectType(${i})"><span id="tl-${i}">${tlabel(t)}</span></button>`
  ).join('') || '<div class="empty">none</div>';
}
function selectType(i){ sel=i; document.querySelectorAll('.titem').forEach((b,idx)=>b.classList.toggle('active',idx===i)); paintDet(templates[i]); }
function paintDet(t){ const ro=t.builtin?'disabled':'';
  document.getElementById('det').innerHTML = `<div class="twocol">
    <div class="panel bevel"><h2>CONFIGURATION ${t.builtin?'':'<button class="btn red" style="float:right" onclick="removeTmpl()">DELETE</button>'}</h2>
      <div class="row">
        <div class="field"><label>BOX TYPE ID</label><input value="${esc(t.id)}" ${ro} oninput="upd('id',this.value)"></div>
        <div class="field"><label>TITLE</label><input value="${esc(t.title)}" ${ro} oninput="upd('title',this.value)"></div>
      </div>
      <div class="field"><label>IMAGE</label><input value="${esc(t.image)}" ${ro} oninput="upd('image',this.value)" placeholder="python:3.12-slim"></div>
      <div class="row">
        <div class="field"><label>WARM MIN</label><input type="number" value="${t.warmMin||0}" oninput="upd('warmMin',+this.value)"></div>
        <div class="field"><label>WARM MAX</label><input type="number" value="${t.warmMax||0}" oninput="upd('warmMax',+this.value)"></div>
        <div class="field"><label>DISABLED</label><input type="checkbox" ${t.disabled?'checked':''} onchange="upd('disabled',this.checked)"></div>
      </div>
      <div class="field"><label>WELCOME</label><input value="${esc(t.welcomeMsg)}" ${ro} oninput="upd('welcomeMsg',this.value)"></div>
      <div class="field"><label>SETUP SCRIPT</label><textarea class="code" style="min-height:110px" ${ro} oninput="upd('setupScript',this.value)">${esc(t.setupScript)}</textarea></div>
    </div>
    <div class="panel bevel"><h2>K8S MANIFEST <button class="btn" style="float:right" onclick="loadManifest()">LOAD GENERATED</button></h2>
      <textarea class="code" id="manifest" oninput="upd('manifest',this.value)" placeholder="Pod YAML — leave blank for the generated spec, or click LOAD GENERATED to start from one…">${esc(t.manifest)}</textarea>
      <p class="note">Free-hand Pod YAML. On apply BOXLY re-enforces guardrails (non-root, dropped caps, service account, labels, /work volume).</p>
    </div></div>`;
}
// Update the model only; refresh the left-list label in place so the focused field is NOT destroyed.
function upd(k,v){ templates[sel][k]=v; if(k==='id'||k==='title'||k==='disabled'){ const el=document.getElementById('tl-'+sel); if(el) el.innerHTML=tlabel(templates[sel]); } }
function addTmpl(){ templates.push({id:'',title:'New box type',category:'Dev',image:'ubuntu:24.04',warmMin:0,warmMax:0}); sel=templates.length-1; renderTList(); paintDet(templates[sel]); }
function removeTmpl(){ templates.splice(sel,1); sel=Math.max(0,sel-1); renderTList(); if(templates[sel])paintDet(templates[sel]); else document.getElementById('det').innerHTML=''; }
async function loadManifest(){ const t=templates[sel];
  try{ const r=await api('POST','/v1/admin/render',{id:t.id,image:t.image,setupScript:t.setupScript}); t.manifest=r.manifest; const el=document.getElementById('manifest'); if(el)el.value=r.manifest; toast('GENERATED MANIFEST LOADED'); }
  catch(e){ toast('ERROR: '+e.message); } }
async function saveTemplates(){ try{ await api('PUT','/v1/admin/templates',templates); toast('SAVED'); await renderTypes(); }catch(e){ toast('ERROR: '+e.message); } }

/* ---------- USERS (multi-tenant tokens) ---------- */
let users=[];   // configured {name,token,expiresAt}
let defaultDays=5, maxDays=0;
function daysLeft(u){ if(!u.expiresAt) return defaultDays; return Math.max(0, Math.ceil((new Date(u.expiresAt)-Date.now())/86400000)); }
async function renderUsers(){
  const c=await api('GET','/v1/admin/config'); users=c.users||[]; defaultDays=c.defaultUserDays||5; maxDays=c.maxUserDays||0;
  document.getElementById('view').innerHTML = `
    <div class="sign"><h4>HOW USERS WORK</h4>
      <ol><li>Add a user — a unique token is generated automatically.</li>
      <li>Give them the <b>connect command</b> shown on their row (copy button).</li>
      <li>They only ever see &amp; control <b>their own</b> boxes — you (admin) see all.</li></ol></div>
    <div class="panel bevel"><h2>ACTIVE USERS</h2><div id="ustats">${LOADING}</div></div>
    <div class="panel bevel"><h2>MANAGE TOKENS <button class="btn" style="float:right" onclick="addUser()">+ ADD USER</button></h2>
      <div id="ulist"></div>
      <div style="margin-top:10px"><button class="btn go" onclick="saveUsers()">SAVE USERS</button></div>
    </div>`;
  renderUList(); paintUsers();
}
function connectCmd(u){ return `BOXLY_SERVER=${location.origin} BOXLY_TOKEN=${u.token||'<token>'} boxly`; }
function renderUList(){
  document.getElementById('ulist').innerHTML = users.map((u,i)=>{ u._days = daysLeft(u); const exp=u.expiresAt?new Date(u.expiresAt).toLocaleDateString():'on save';
    return `<div class="upanel">
    <div class="row" style="margin:0 0 8px">
      <div class="field" style="margin:0"><label>NAME</label><input value="${esc(u.name)}" oninput="users[${i}].name=this.value"></div>
      <div class="field" style="margin:0"><label>VALID (DAYS)${maxDays?' · max '+maxDays:''}</label><input type="number" min="1" ${maxDays?'max="'+maxDays+'"':''} value="${u._days}" oninput="users[${i}]._days=+this.value"></div>
      <div class="field" style="margin:0;align-self:end;display:flex;gap:6px">
        <button class="btn" onclick="regenToken(${i})">REGEN</button>
        <button class="btn red" onclick="users.splice(${i},1);renderUList()">REMOVE</button>
      </div>
    </div>
    <div class="field" style="margin:0 0 8px"><label>TOKEN · expires ${exp}</label><input value="${esc(u.token)}" oninput="users[${i}].token=this.value;document.getElementById('cmd-${i}').value=connectCmd(users[${i}])"></div>
    <label>CONNECT COMMAND (give this to the user)</label>
    <div style="display:flex;gap:6px"><input id="cmd-${i}" class="cmdinput" readonly value="${esc(connectCmd(u))}">
      <button class="btn" onclick="copyCmd(${i})">COPY</button></div>
  </div>`;}).join('') || '<div class="note">No users yet. The legacy BOXLY_TOKEN maps to user "default".</div>';
}
function genToken(){ const a=new Uint8Array(18); crypto.getRandomValues(a); return 'tok_'+Array.from(a).map(b=>b.toString(16).padStart(2,'0')).join(''); }
function uniqueToken(){ let t; do{ t=genToken(); }while(users.some(u=>u.token===t)); return t; }
function addUser(){ users.push({name:'',token:uniqueToken()}); renderUList(); }
function regenToken(i){ users[i].token=uniqueToken(); renderUList(); }
function copyCmd(i){ const el=document.getElementById('cmd-'+i); el.select(); navigator.clipboard?.writeText(el.value); toast('CONNECT COMMAND COPIED'); }
async function saveUsers(){
  const names=users.map(u=>u.name.trim()), toks=users.map(u=>u.token.trim());
  if(names.some(n=>!n)){ toast('EVERY USER NEEDS A NAME'); return; }
  if(new Set(names).size!==names.length){ toast('DUPLICATE USER NAME'); return; }
  if(new Set(toks).size!==toks.length){ toast('DUPLICATE TOKEN'); return; }
  const c=await api('GET','/v1/admin/config');
  c.users=users.map((u,i)=>{ let d=u._days||defaultDays; if(maxDays&&d>maxDays)d=maxDays; if(d<1)d=1;
    return {name:names[i], token:toks[i], expiresAt:new Date(Date.now()+d*86400000).toISOString()}; });
  try{ await api('PUT','/v1/admin/config',c); toast('USERS SAVED · validity set from now'); await renderUsers(); }catch(e){ toast('ERROR: '+e.message); } }
async function paintUsers(){
  let stats; try{ stats=await api('GET','/v1/admin/users'); }catch(e){ return; }
  const el=document.getElementById('ustats'); if(!el) return;
  el.innerHTML = `<table><thead><tr><th>USER</th><th class="num">ACTIVE BOXES</th></tr></thead><tbody>${
    stats.map(u=>`<tr><td><span class="owner">${esc(u.name)}</span></td><td class="num">${u.boxes}</td></tr>`).join('')
    || '<tr><td colspan="2" class="empty">no users active</td></tr>'}</tbody></table>`;
}

/* ---------- SETTINGS ---------- */
async function renderSettings(){ const c=await api('GET','/v1/admin/config');
  document.getElementById('view').innerHTML = `
   <div class="panel bevel"><h2>INSTALL INFO</h2>
     <div class="meta" style="color:#3a2a18;font-size:18px">NAMESPACE <b class="podname" style="color:#3a2a18">${esc(c.namespace||'—')}</b>
       <span class="note" style="display:block;margin-top:4px">Fixed at install — shown for reference, not editable here.</span></div></div>
   <div class="panel bevel"><h2>WARM POOL & DEFAULTS</h2>
     <div class="row">
       <div class="field"><label>POOL MIN</label><input id="poolMin" type="number" value="${c.poolMin}"></div>
       <div class="field"><label>POOL MAX</label><input id="poolMax" type="number" value="${c.poolMax}"></div>
       <div class="field"><label>DECAY (0-1)</label><input id="poolDecay" type="number" step="0.05" value="${c.poolDecay}"></div>
       <div class="field"><label>BOX TTL (SEC)</label><input id="ttl" type="number" value="${c.defaultTtlSeconds}"></div>
       <div class="field"><label>DEFAULT IMAGE</label><input id="defaultImage" value="${esc(c.defaultImage)}"></div>
     </div>
     <h2 style="margin-top:8px">USER ONBOARDING</h2>
     <div class="row">
       <div class="field"><label>DEFAULT VALIDITY (DAYS)</label><input id="defaultUserDays" type="number" min="1" value="${c.defaultUserDays}"></div>
       <div class="field"><label>MAX VALIDITY (DAYS, 0=∞)</label><input id="maxUserDays" type="number" min="0" value="${c.maxUserDays}"></div>
     </div>
     <button class="btn go" onclick="saveSettings()">SAVE</button></div>
   <div class="panel bevel"><h2>IMAGE PULL SECRET</h2>
     <div class="field"><label>EXISTING SECRET NAMES (CSV)</label><input id="pullSecrets" value="${esc((c.pullSecrets||[]).join(','))}"></div>
     <div class="field"><label>SECRET MANIFEST (APPLIED & REFERENCED)</label>
       <textarea id="pullSecretYaml" class="code" style="min-height:160px" placeholder="apiVersion: v1&#10;kind: Secret&#10;metadata:&#10;  name: my-registry&#10;type: kubernetes.io/dockerconfigjson&#10;data:&#10;  .dockerconfigjson: <base64>">${esc(c.pullSecretYaml)}</textarea>
       <p class="note">k8s Secret (type dockerconfigjson). BOXLY applies it and adds it to every container's imagePullSecrets.</p></div>
     <button class="btn go" onclick="saveSettings()">SAVE</button></div>`;
}
async function saveSettings(){ const g=id=>document.getElementById(id); const c=await api('GET','/v1/admin/config');
  c.poolMin=+g('poolMin').value; c.poolMax=+g('poolMax').value; c.poolDecay=+g('poolDecay').value;
  c.defaultTtlSeconds=+g('ttl').value; c.defaultImage=g('defaultImage').value;
  c.defaultUserDays=+g('defaultUserDays').value; c.maxUserDays=+g('maxUserDays').value;
  c.pullSecrets=g('pullSecrets').value.split(',').map(s=>s.trim()).filter(Boolean); c.pullSecretYaml=g('pullSecretYaml').value;
  try{ await api('PUT','/v1/admin/config',c); toast('SAVED'); }catch(e){ toast('ERROR: '+e.message); } }

const HEAD =
`<span class="bn1">██████   ██████  ██   ██ ██      ██   ██</span>
<span class="bn2">██   ██ ██    ██  ██ ██  ██       ██ ██</span>
<span class="bn3">██████  ██    ██   ███   ██        ███</span>
<span class="bn4">██   ██ ██    ██  ██ ██  ██         ██</span>
<span class="bn5">██████   ██████  ██   ██ ███████    ██</span>
<span class="dim">> terminal dashboard</span>   <span class="ok">live pools ↗ /pools</span>
`;
const FOOT = `\n<span class="dim">» [n] new · [↵] open · [d] del · [q] quit</span>`;
const frames = [
  {ms:2200, body:HEAD+`
<span class="dim">  NAME       ID        TYPE       STATUS</span>
<span class="selrow">▸ scratch    a1b2c3    normal     Running  </span>
<span class="rowg">  git-lab    7d3e9f    learn-git  Running</span>`+FOOT},
  {ms:1100, body:HEAD+`
<span class="ok">  ? launch which box type?</span>
<span class="selrow"> ▸ Learn: Git  </span>
<span class="rowg">   Dev: Python</span>
<span class="rowg">   Normal VM</span>`},
  {ms:1500, body:HEAD+`
  <span class="dim">spinning up learn-git…</span>
  <span class="ok">ready in 40ms · connecting</span>`},
  {ms:2400, body:HEAD+`
<span class="dim">  NAME       ID        TYPE       STATUS</span>
<span class="rowg">  scratch    a1b2c3    normal     Running</span>
<span class="selrow">▸ git-lab    7d3e9f    learn-git  Running  </span>`+FOOT},
];
const sleep = ms => new Promise(r=>setTimeout(r,ms));
const loginVisible = () => !document.getElementById('login').classList.contains('hidden');
async function tuiDemo(){
  const el=document.getElementById('demo'); if(!el) return;
  let i=0;
  while(loginVisible()){
    el.innerHTML = frames[i % frames.length].body;
    await sleep(frames[i % frames.length].ms);
    i++;
  }
}
async function loadStats(){
  const el=document.getElementById('statboard'); if(!el) return;
  try{ const s=await fetch('/admin/stats').then(r=>r.json());
    el.innerHTML = `<span class="stat">${s.instances} ACTIVE</span><span class="stat">${s.owners} OWNERS</span><span class="stat">${s.types} TYPES</span>`;
  }catch(e){ el.innerHTML=''; }
}
tuiDemo(); loadStats(); setInterval(()=>{ if(loginVisible()) loadStats(); }, 5000);

if(TOKEN) boot();
</script>
